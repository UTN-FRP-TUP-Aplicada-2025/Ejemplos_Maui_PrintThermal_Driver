name: CD NuGet - Publish MotorDsl

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  publish:
    name: Pack & Publish to NuGet.org
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Get version from tag or input
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Restore
        run: dotnet restore src/MotorDsl.Core/MotorDsl.Core.csproj
        # Resto de proyectos dependen de Core

      - name: Build
        run: |
          dotnet build src/MotorDsl.Core/MotorDsl.Core.csproj -c Release --no-restore
          dotnet build src/MotorDsl.Parser/MotorDsl.Parser.csproj -c Release --no-restore
          dotnet build src/MotorDsl.Rendering/MotorDsl.Rendering.csproj -c Release --no-restore
          dotnet build src/MotorDsl.Extensions/MotorDsl.Extensions.csproj -c Release --no-restore

      - name: Pack
        run: |
          dotnet pack src/MotorDsl.Core/MotorDsl.Core.csproj -c Release --no-build -o ./nupkgs /p:Version=${{ steps.version.outputs.VERSION }}
          dotnet pack src/MotorDsl.Parser/MotorDsl.Parser.csproj -c Release --no-build -o ./nupkgs /p:Version=${{ steps.version.outputs.VERSION }}
          dotnet pack src/MotorDsl.Rendering/MotorDsl.Rendering.csproj -c Release --no-build -o ./nupkgs /p:Version=${{ steps.version.outputs.VERSION }}
          dotnet pack src/MotorDsl.Extensions/MotorDsl.Extensions.csproj -c Release --no-build -o ./nupkgs /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Upload packages as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-${{ steps.version.outputs.VERSION }}
          path: ./nupkgs/*.nupkg

      - name: Publish to NuGet.org
        run: |
          dotnet nuget push ./nupkgs/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
