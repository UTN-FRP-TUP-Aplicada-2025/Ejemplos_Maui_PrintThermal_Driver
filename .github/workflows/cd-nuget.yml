name: CD NuGet - Publish MotorDsl

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión a publicar (ej: 1.0.0)'
        required: true

env:
  DOTNET_VERSION: '10.0.102'

jobs:
  publish-nuget:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET ${{ env.DOTNET_VERSION }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Determinar versión
      run: |
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
        else
          VERSION="${{ github.event.inputs.version }}"
        fi
        echo "PACKAGE_VERSION=$VERSION" >> $GITHUB_ENV
        echo "Versión a publicar: $VERSION"

    - name: Restore
      run: dotnet restore PrintThermalDriver.sln

    - name: Build Release
      run: dotnet build PrintThermalDriver.sln -c Release --no-restore

    - name: Tests
      run: dotnet test src/MotorDsl.Tests/MotorDsl.Tests.csproj -c Release --no-build

    - name: Pack los 4 proyectos de la librería
      run: |
        for proj in Core Parser Rendering Extensions; do
          dotnet pack src/MotorDsl.$proj/MotorDsl.$proj.csproj \
            -c Release \
            --no-build \
            -p:PackageVersion=${{ env.PACKAGE_VERSION }} \
            -o ./nupkg
        done

    - name: Listar paquetes generados
      run: ls -la ./nupkg/

    - name: Publish to GitHub Packages
      run: |
        dotnet nuget push ./nupkg/*.nupkg \
          --api-key ${{ secrets.GITHUB_TOKEN }} \
          --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json \
          --skip-duplicate

    - name: Upload nupkg artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages-${{ env.PACKAGE_VERSION }}
        path: ./nupkg/*.nupkg
        retention-days: 30
