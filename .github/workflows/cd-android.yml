name: CD Android - APK Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.102'
  DOTNET_VERSION_WORKLOAD: '10.0.100'

jobs:
  build-android:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - name: SampleApp
            path: samples/MotorDsl.SampleApp/MotorDsl.SampleApp.csproj
            output: output/sampleapp
            package: com.motordsl.sampleapp
          - name: MultaApp
            path: samples/MotorDsl.MultaApp/MotorDsl.MultaApp.csproj
            output: output/multaapp
            package: com.motordsl.multaapp

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET ${{ env.DOTNET_VERSION }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install MAUI Android workload
      run: dotnet workload install maui-android --version ${{ env.DOTNET_VERSION_WORKLOAD }}

    - name: Restore
      run: dotnet restore ${{ matrix.app.path }}

    - name: Publish APK
      run: |
        dotnet publish ${{ matrix.app.path }} \
          -f net10.0-android \
          -c Release \
          -p:AndroidPackageFormat=apk \
          -p:AndroidKeyStore=false \
          -o ${{ matrix.app.output }}

    - name: Verificar APK generado
      run: |
        echo "Archivos generados:"
        ls -la ${{ matrix.app.output }}/
        echo "APK Signed:"
        ls ${{ matrix.app.output }}/${{ matrix.app.package }}-Signed.apk

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.app.name }}-APK-${{ github.run_number }}
        path: ${{ matrix.app.output }}/${{ matrix.app.package }}-Signed.apk
        retention-days: 7
