name: CI - Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '10.0.102'

jobs:
  test:
    runs-on: ubuntu-latest
    name: 185 tests — MotorDsl.Tests

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET ${{ env.DOTNET_VERSION }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore
      run: dotnet restore src/MotorDsl.Tests/MotorDsl.Tests.csproj

    - name: Build
      run: dotnet build src/MotorDsl.Tests/MotorDsl.Tests.csproj -c Release --no-restore

    - name: Test
      run: |
        dotnet test src/MotorDsl.Tests/MotorDsl.Tests.csproj \
          -c Release \
          --no-build \
          --logger "trx;LogFileName=test-results.trx" \
          --results-directory ./TestResults \
          --verbosity minimal

    - name: Subir resultados como artefacto
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ github.run_number }}
        path: ./TestResults/*.trx
        retention-days: 7

    - name: Comentar PR si falla
      if: failure() && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '❌ **CI falló** — Los tests unitarios no pasaron en este PR.\n\n' +
                  'Proyecto: `PrintThermalDriver.sln` | Target: 185 tests, 0 errores.\n\n' +
                  'Ver los [logs de Actions](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) para más detalles.'
          })
